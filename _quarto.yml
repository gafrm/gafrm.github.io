project:
  type: website
  output-dir: docs
  pre-render:  # This can be deleted if you are using the manually curated list of publications in publications.qmd
    - py xlsx_to_yml.py  # Automatically generate publications.yml from publications.xlsx
    
# Meta
description-meta: "Quarto Academic Website Template adapted from a template by Dr. Gang He"
author-meta: "Dr. Gang He"

website:
  title: "Gabriel Frazer-McKee"
  description: "Academic website of Gabriel Frazer-McKee"
  site-url: "https://gafrm.github.io"
 
  navbar:
    background: light
    title: false

    left:
      - text: "Gabriel Frazer-McKee"
        menu:
        - text: About
          href: about.qmd
        - text: Research
          href: projects.qmd
        - text: Teaching
          href: teaching.qmd
        - text: Blog
          href: posts.qmd
        - text: Publications
          href: publications.qmd
        - text: CV
          href: files/nsf-biosketch.pdf
        - text: Contact
          href: contact.qmd

    right:
      - text: About
        href: about.qmd
      - text: Research
        href: projects.qmd
      - text: Teaching
        href: teaching.qmd
      - text: Blog
        href: posts.qmd
      - text: Publications
        href: publications.qmd
      - text: CV
        href: files/nsf-biosketch.pdf
      - icon: github
        href: https://github.com/gafrm
        target: _blank
      - icon: rss
        href: posts.xml
        target: _blank
  
  page-navigation: true
  
  page-footer: 
    left: ""
    center: "© <script>document.write(new Date().getFullYear())</script> Gabriel Frazer-McKee · Made with [Quarto](https://quarto.org)"
    right:  
      - text: Contact
        href: contact.qmd
      - icon: github
        href: https://github.com/gafrm
        target: _blank
      - icon: rss
        href: posts.xml
        target: _blank
        
  search:
    location: navbar
    type: overlay
  
  reader-mode: true

  draft-mode: unlinked
  
  repo-url: https://github.com/drganghe/quarto-academic-website-template
#  repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card: true 
#  card-style: summary      
    
  google-analytics:
    tracking-id: ""  # Please delete or replace with your own tracking ID
    anonymize-ip: true 

bibliography: references.bib  # Add references.bib to the root folder to enable the bibliography function

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    include-in-header: "files/includes/_academic.qmd"

